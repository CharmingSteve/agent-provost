name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Restrict the default GITHUB_TOKEN to read-only; jobs that need more
# permissions declare their own permissions block explicitly.
permissions:
  contents: read

jobs:
  # ── Shell linting ──────────────────────────────────────────────────────────
  lint-shell:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck
      - name: Lint shell scripts
        run: shellcheck entrypoint.sh verify_proxy_routing.sh

  # ── Dockerfile linting ─────────────────────────────────────────────────────
  lint-dockerfile:
    name: Hadolint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: alpaca-mcp.Dockerfile

  # ── Lua linting ────────────────────────────────────────────────────────────
  lint-lua:
    name: luacheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install luacheck
        run: |
          sudo apt-get install -y lua5.1 luarocks
          sudo luarocks install luacheck
      - name: Lint Lua test files
        run: luacheck tests/lua/

  # ── Lua unit tests ─────────────────────────────────────────────────────────
  test-lua:
    name: busted (Lua unit tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install LuaJIT + busted
        run: |
          sudo apt-get install -y luajit lua5.1 luarocks
          sudo luarocks install busted
      - name: Run Lua unit tests
        run: busted tests/lua/

  # ── Shell unit tests ───────────────────────────────────────────────────────
  test-shell:
    name: bats (shell unit tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install bats
        run: sudo apt-get install -y bats
      - name: Run bats tests
        run: bats tests/shell/

  # ── Trivy filesystem scan ──────────────────────────────────────────────────
  security-trivy:
    name: Trivy (filesystem / config scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          trivyignores: .trivyignore

  # ── Checkov IaC security scan ──────────────────────────────────────────────
  security-checkov:
    name: Checkov (IaC security)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          framework: dockerfile,docker_compose
          quiet: true
          soft_fail: true

  # ── Secrets detection ──────────────────────────────────────────────────────
  security-gitleaks:
    name: Gitleaks (secrets detection)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write  # upload SARIF findings to GitHub Security tab
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
