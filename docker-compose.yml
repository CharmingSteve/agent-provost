services:
  alpaca-mcp:
    image: python:3.11-slim
    container_name: alpaca-mcp
    command: ["/bin/sh", "/setup/entrypoint.sh"]
    env_file:
      - .env
    environment:
      # Route Alpaca API calls through the proxy for full two-hop logging.
      # DATA_API_URL is read natively by v2; TRADE_API_URL requires the patch in entrypoint.sh.
      TRADE_API_URL: "http://agent-provost:8081/trading"
      DATA_API_URL: "http://agent-provost:8081/data"
    expose:
      - "8088"
    volumes:
      - ./entrypoint.sh:/setup/entrypoint.sh:ro
    networks:
      - mcp_internal
      - proxy_egress
    restart: unless-stopped

  agent-provost:
    image: openresty/openresty:alpine
    container_name: agent-provost
    depends_on:
      - alpaca-mcp
    ports:
      - "8088:8000"
    expose:
      - "8081"
    volumes:
      - ./default.conf:/usr/local/openresty/nginx/conf/nginx.conf:ro
      - ./nginx-logs:/data/nginx-logs
    networks:
      - mcp_internal
      - proxy_egress
    restart: unless-stopped

networks:
  mcp_internal:
    internal: true
  proxy_egress:
