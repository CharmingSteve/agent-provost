services:
  sefaria-mcp:
    image: sefaria-mcp
    container_name: sefaria-mcp
    environment:
      SEFARIA_API_BASE_URL: http://agent-proxy:8081
    expose:
      - "8088"
    networks:
      - mcp_internal
    restart: unless-stopped

  agent-proxy:
    image: openresty/openresty:alpine
    container_name: agent-proxy
    depends_on:
      - sefaria-mcp
    ports:
      - "8088:8000"
    expose:
      - "8081"
    volumes:
      - ./default.conf:/usr/local/openresty/nginx/conf/nginx.conf:ro
      - ./nginx-logs:/data/nginx-logs
    networks:
      - mcp_internal
      - proxy_egress
    restart: unless-stopped

networks:
  mcp_internal:
    internal: true
  proxy_egress:
