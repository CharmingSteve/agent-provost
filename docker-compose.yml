services:
  alpaca-mcp:
    build:
      context: .
      dockerfile: alpaca-mcp.Dockerfile
    container_name: alpaca-mcp
    volumes:
      - ./entrypoint.sh:/entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    env_file:
      - .env
    environment:
      TRADE_API_URL: "http://agent-provost:8081/trading"
      DATA_API_URL: "http://agent-provost:8081/data"
      BROKER_API_URL: "http://agent-provost:8081/broker"
    expose:
      - "8088"
    networks:
      - mcp_internal
    restart: unless-stopped

  agent-provost:
    image: openresty/openresty@sha256:16527c6c0a8119dc948933718bf2e4a5366bc62b5b3cd72881999852ceaea94c
    container_name: agent-provost
    depends_on:
      - alpaca-mcp
    ports:
      - "8088:8000"
    expose:
      - "8081"
    volumes:
      - ./default.conf:/usr/local/openresty/nginx/conf/nginx.conf:ro
      - ./nginx-logs:/data/nginx-logs
    networks:
      - mcp_internal
      - proxy_egress
    restart: unless-stopped

networks:
  mcp_internal:
    internal: true
  proxy_egress:
