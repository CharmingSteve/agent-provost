worker_processes  1;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    # The ultimate audit ledger format
    log_format json_full escape=json
    '{'
      '"time_local":"$time_local",'
      '"remote_addr":"$remote_addr",'
      '"request":"$request",'
      '"status": "$status",'
      '"body_bytes_sent":"$body_bytes_sent",'
      '"request_time":"$request_time",'
      '"upstream_response_time":"$upstream_response_time",'
      '"request_body":"$req_body",'
      '"resp_body":"$resp_body"'
    '}';

    # ==================================================================
    # HOP 1: INBOUND FIREWALL (LLM -> MCP Server)
    # ==================================================================
    server {
        listen 8000;
        server_name localhost;

        access_log /data/nginx-logs/llm_to_alpaca_access.log json_full;
        error_log  /data/nginx-logs/llm_to_alpaca_error.log info;

        set $req_body "";
        set $resp_body "";

        location / {
            lua_need_request_body on;

            # --- THE CIRCUIT BREAKER ---
            access_by_lua_block {
                local req_body = ngx.req.get_body_data()
                if req_body then
                    ngx.var.req_body = req_body
                    local cjson = require "cjson.safe"
                    local parsed, err = cjson.decode(req_body)
                    
                    if parsed and parsed.params and parsed.params.arguments then
                        local args = parsed.params.arguments
                        local qty = tonumber(args.quantity) or tonumber(args.qty)
                        
                        -- If trade size > 100, BLOCK IT
                        if qty and qty > 100 then
                            ngx.status = 403
                            ngx.header["Content-Type"] = "application/json"
                            ngx.say('{"error": "PROVOST_INTERVENTION: Risk Limit Exceeded. Attempted trade size too large. Blocked to protect capital."}')
                            return ngx.exit(403)
                        end
                    end
                end
            }

            # --- THE LEDGER ---
            body_filter_by_lua_block {
                local chunk = ngx.arg[1]
                local MAX_CAPTURE_BYTES = 65536
                local buffered = ngx.ctx.buffered or ""
                if #buffered < MAX_CAPTURE_BYTES and chunk and #chunk > 0 then
                    local remaining = MAX_CAPTURE_BYTES - #buffered
                    if #chunk > remaining then
                        buffered = buffered .. string.sub(chunk, 1, remaining)
                    else
                        buffered = buffered .. chunk
                    end
                    ngx.ctx.buffered = buffered
                end
                if ngx.arg[2] then
                    ngx.var.resp_body = buffered
                end
            }

            proxy_pass http://alpaca-mcp:8088;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            
            # Required for SSE (Server-Sent Events)
            proxy_set_header Connection '';
            proxy_http_version 1.1;
            chunked_transfer_encoding off;
            proxy_buffering off;
            proxy_cache off;
        }
    }

    # ==================================================================
    # HOP 2: OUTBOUND LEDGER (MCP Server -> Wall Street)
    # ==================================================================
    server {
        listen 8081;
        server_name localhost;

        access_log /data/nginx-logs/mcp_to_alpaca_access.log json_full;
        error_log  /data/nginx-logs/mcp_to_alpaca_error.log info;

        set $req_body "";
        set $resp_body "";

        location /trading/ {
            lua_need_request_body on;

            access_by_lua_block {
                local req_body = ngx.req.get_body_data()
                if req_body then
                    ngx.var.req_body = req_body
                end
            }

            body_filter_by_lua_block {
                local chunk = ngx.arg[1]
                local MAX_CAPTURE_BYTES = 65536
                local buffered = ngx.ctx.buffered or ""
                if #buffered < MAX_CAPTURE_BYTES and chunk and #chunk > 0 then
                    local remaining = MAX_CAPTURE_BYTES - #buffered
                    if #chunk > remaining then
                        buffered = buffered .. string.sub(chunk, 1, remaining)
                    else
                        buffered = buffered .. chunk
                    end
                    ngx.ctx.buffered = buffered
                end
                if ngx.arg[2] then
                    ngx.var.resp_body = buffered
                end
            }

            rewrite ^/trading(/.*)$ $1 break;
            proxy_pass https://paper-api.alpaca.markets;

            proxy_ssl_server_name on;
            proxy_set_header Host paper-api.alpaca.markets;
        }

        location /data/ {
            lua_need_request_body on;

            access_by_lua_block {
                local req_body = ngx.req.get_body_data()
                if req_body then
                    ngx.var.req_body = req_body
                end
            }

            body_filter_by_lua_block {
                local chunk = ngx.arg[1]
                local MAX_CAPTURE_BYTES = 65536
                local buffered = ngx.ctx.buffered or ""
                if #buffered < MAX_CAPTURE_BYTES and chunk and #chunk > 0 then
                    local remaining = MAX_CAPTURE_BYTES - #buffered
                    if #chunk > remaining then
                        buffered = buffered .. string.sub(chunk, 1, remaining)
                    else
                        buffered = buffered .. chunk
                    end
                    ngx.ctx.buffered = buffered
                end
                if ngx.arg[2] then
                    ngx.var.resp_body = buffered
                end
            }

            rewrite ^/data(/.*)$ $1 break;
            proxy_pass https://data.alpaca.markets;

            proxy_ssl_server_name on;
            proxy_set_header Host data.alpaca.markets;
        }

        location /broker/ {
            lua_need_request_body on;

            access_by_lua_block {
                local req_body = ngx.req.get_body_data()
                if req_body then
                    ngx.var.req_body = req_body
                end
            }

            body_filter_by_lua_block {
                local chunk = ngx.arg[1]
                local MAX_CAPTURE_BYTES = 65536
                local buffered = ngx.ctx.buffered or ""
                if #buffered < MAX_CAPTURE_BYTES and chunk and #chunk > 0 then
                    local remaining = MAX_CAPTURE_BYTES - #buffered
                    if #chunk > remaining then
                        buffered = buffered .. string.sub(chunk, 1, remaining)
                    else
                        buffered = buffered .. chunk
                    end
                    ngx.ctx.buffered = buffered
                end
                if ngx.arg[2] then
                    ngx.var.resp_body = buffered
                end
            }

            rewrite ^/broker(/.*)$ $1 break;
            proxy_pass https://broker-api.alpaca.markets;

            proxy_ssl_server_name on;
            proxy_set_header Host broker-api.alpaca.markets;
        }

        # Fallback route for any unprefixed calls.
        location / {
            lua_need_request_body on;

            access_by_lua_block {
                local req_body = ngx.req.get_body_data()
                if req_body then
                    ngx.var.req_body = req_body
                end
            }

            body_filter_by_lua_block {
                local chunk = ngx.arg[1]
                local MAX_CAPTURE_BYTES = 65536
                local buffered = ngx.ctx.buffered or ""
                if #buffered < MAX_CAPTURE_BYTES and chunk and #chunk > 0 then
                    local remaining = MAX_CAPTURE_BYTES - #buffered
                    if #chunk > remaining then
                        buffered = buffered .. string.sub(chunk, 1, remaining)
                    else
                        buffered = buffered .. chunk
                    end
                    ngx.ctx.buffered = buffered
                end
                if ngx.arg[2] then
                    ngx.var.resp_body = buffered
                end
            }

            proxy_pass https://paper-api.alpaca.markets;

            proxy_ssl_server_name on;
            proxy_set_header Host paper-api.alpaca.markets;
        }
    }
}
