worker_processes auto;

error_log /dev/stderr info;
pid /tmp/nginx.pid;

events {
    worker_connections 4096;
}

http {
    include /usr/local/openresty/nginx/conf/mime.types;
    default_type application/octet-stream;
    lua_need_request_body on;
    client_body_in_single_buffer on;

    log_format json_full escape=json '{'
        '"ts":"$time_iso8601",'
        '"server":"$server_addr:$server_port",'
        '"remote_addr":"$remote_addr",'
        '"remote_port":"$remote_port",'
        '"realip_remote_addr":"$realip_remote_addr",'
        '"request_id":"$request_id",'
        '"connection":"$connection",'
        '"connection_requests":"$connection_requests",'
        '"method":"$request_method",'
        '"scheme":"$scheme",'
        '"host":"$host",'
        '"uri":"$request_uri",'
        '"args":"$args",'
        '"status":$status,'
        '"request_length":$request_length,'
        '"body_bytes_sent":$body_bytes_sent,'
        '"bytes_sent":$bytes_sent,'
        '"request_time":$request_time,'
        '"upstream_addr":"$upstream_addr",'
        '"upstream_status":"$upstream_status",'
        '"upstream_connect_time":"$upstream_connect_time",'
        '"upstream_header_time":"$upstream_header_time",'
        '"upstream_response_time":"$upstream_response_time",'
        '"upstream_response_length":"$upstream_response_length",'
        '"request_body":"$request_body",'
        '"response_body":"$resp_body",'
        '"response_body_truncated":"$resp_body_truncated",'
        '"content_type":"$content_type",'
        '"content_length":"$content_length",'
        '"http_user_agent":"$http_user_agent",'
        '"http_referer":"$http_referer",'
        '"http_authorization":"$http_authorization",'
        '"http_x_agent_name":"$http_x_agent_name",'
        '"http_x_agent_session":"$http_x_agent_session",'
        '"http_x_forwarded_for":"$http_x_forwarded_for",'
        '"http_x_forwarded_proto":"$http_x_forwarded_proto",'
        '"http_x_forwarded_host":"$http_x_forwarded_host",'
        '"http_x_forwarded_port":"$http_x_forwarded_port",'
        '"http_x_request_id":"$http_x_request_id",'
        '"http_accept":"$http_accept",'
        '"http_accept_encoding":"$http_accept_encoding",'
        '"http_accept_language":"$http_accept_language",'
        '"http_origin":"$http_origin",'
        '"http_cookie":"$http_cookie",'
        '"proxy_add_x_forwarded_for":"$proxy_add_x_forwarded_for",'
        '"server_protocol":"$server_protocol",'
        '"sent_http_content_type":"$sent_http_content_type",'
        '"sent_http_content_length":"$sent_http_content_length",'
        '"sent_http_cache_control":"$sent_http_cache_control",'
        '"sent_http_etag":"$sent_http_etag",'
        '"sent_http_last_modified":"$sent_http_last_modified",'
        '"sent_http_location":"$sent_http_location",'
        '"upstream_http_content_type":"$upstream_http_content_type",'
        '"upstream_http_content_length":"$upstream_http_content_length",'
        '"upstream_http_date":"$upstream_http_date",'
        '"upstream_http_server":"$upstream_http_server",'
        '"upstream_http_cache_control":"$upstream_http_cache_control",'
        '"upstream_http_etag":"$upstream_http_etag",'
        '"upstream_http_last_modified":"$upstream_http_last_modified",'
        '"upstream_http_location":"$upstream_http_location",'
        '"upstream_http_x_request_id":"$upstream_http_x_request_id",'
        '"upstream_http_x_runtime":"$upstream_http_x_runtime",'
        '"upstream_http_x_cache":"$upstream_http_x_cache",'
        '"upstream_http_vary":"$upstream_http_vary"'
    '}';

    access_log off;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;

    client_max_body_size 100m;
    client_body_buffer_size 1m;

    proxy_http_version 1.1;
    proxy_buffering on;
    proxy_request_buffering on;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    proxy_connect_timeout 30s;

    upstream sefaria_mcp {
        server sefaria-mcp:8088;
        keepalive 64;
    }

    upstream sefaria_api {
        server www.sefaria.org:443;
        keepalive 64;
    }

    server {
        listen 8000;
        server_name _;
        set $resp_body "";
        set $resp_body_truncated "0";

        access_log /data/nginx-logs/llm_to_mcp_access.log json_full;
        error_log /data/nginx-logs/llm_to_mcp_error.log info;

        location / {
            proxy_pass http://sefaria_mcp;

            body_filter_by_lua_block {
                local chunk = ngx.arg[1]
                local max_len = 1048576
                local existing = ngx.var.resp_body or ""

                if chunk and chunk ~= "" then
                    if #existing < max_len then
                        local remaining = max_len - #existing
                        if #chunk <= remaining then
                            ngx.var.resp_body = existing .. chunk
                        else
                            ngx.var.resp_body = existing .. string.sub(chunk, 1, remaining)
                            ngx.var.resp_body_truncated = "1"
                        end
                    else
                        ngx.var.resp_body_truncated = "1"
                    end
                end
            }

            proxy_set_header Host $host;
            proxy_set_header Connection "";
            proxy_set_header Accept-Encoding "";
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header X-Request-Id $request_id;
        }
    }

    server {
        listen 8081;
        server_name _;
        set $resp_body "";
        set $resp_body_truncated "0";

        access_log /data/nginx-logs/mcp_to_sefaria_access.log json_full;
        error_log /data/nginx-logs/mcp_to_sefaria_error.log info;

        location / {
            proxy_pass https://sefaria_api;

            body_filter_by_lua_block {
                local chunk = ngx.arg[1]
                local max_len = 1048576
                local existing = ngx.var.resp_body or ""

                if chunk and chunk ~= "" then
                    if #existing < max_len then
                        local remaining = max_len - #existing
                        if #chunk <= remaining then
                            ngx.var.resp_body = existing .. chunk
                        else
                            ngx.var.resp_body = existing .. string.sub(chunk, 1, remaining)
                            ngx.var.resp_body_truncated = "1"
                        end
                    else
                        ngx.var.resp_body_truncated = "1"
                    end
                end
            }

            proxy_ssl_server_name on;
            proxy_ssl_name www.sefaria.org;

            proxy_set_header Host www.sefaria.org;
            proxy_set_header Connection "";
            proxy_set_header Accept-Encoding "";
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;
            proxy_set_header X-Request-Id $request_id;
        }
    }
}
