worker_processes auto;

error_log /dev/stderr info;
pid /tmp/nginx.pid;

events {
	worker_connections 4096;
}

http {
	include /usr/local/openresty/nginx/conf/mime.types;
	default_type application/octet-stream;
	lua_need_request_body on;
	client_body_in_single_buffer on;

	log_format json_full escape=json '{'
		'"ts":"$time_iso8601",'
		'"server":"$server_addr:$server_port",'
		'"remote_addr":"$remote_addr",'
		'"remote_port":"$remote_port",'
		'"realip_remote_addr":"$realip_remote_addr",'
		'"request_id":"$request_id",'
		'"connection":"$connection",'
		'"connection_requests":"$connection_requests",'
		'"method":"$request_method",'
		'"scheme":"$scheme",'
		'"host":"$host",'
		'"uri":"$request_uri",'
		'"args":"$args",'
		'"status":$status,'
		'"request_length":$request_length,'
		'"body_bytes_sent":$body_bytes_sent,'
		'"bytes_sent":$bytes_sent,'
		'"request_time":$request_time,'
		'"upstream_addr":"$upstream_addr",'
		'"upstream_status":"$upstream_status",'
		'"upstream_connect_time":"$upstream_connect_time",'
		'"upstream_header_time":"$upstream_header_time",'
		'"upstream_response_time":"$upstream_response_time",'
		'"upstream_response_length":"$upstream_response_length",'
		'"request_body":"$req_body",'
		'"request_body_truncated":"$req_body_truncated",'
		'"response_body":"$resp_body",'
		'"response_body_truncated":"$resp_body_truncated",'
		'"content_type":"$content_type",'
		'"content_length":"$content_length",'
		'"http_user_agent":"$http_user_agent",'
		'"http_referer":"$http_referer",'
		'"http_authorization":"$http_authorization",'
		'"http_x_agent_name":"$http_x_agent_name",'
		'"http_x_agent_session":"$http_x_agent_session",'
		'"http_x_forwarded_for":"$http_x_forwarded_for",'
		'"http_x_forwarded_proto":"$http_x_forwarded_proto",'
		'"http_x_forwarded_host":"$http_x_forwarded_host",'
		'"http_x_forwarded_port":"$http_x_forwarded_port",'
		'"http_x_request_id":"$http_x_request_id",'
		'"http_accept":"$http_accept",'
		'"http_accept_encoding":"$http_accept_encoding",'
		'"http_accept_language":"$http_accept_language",'
		'"http_origin":"$http_origin",'
		'"http_cookie":"$http_cookie",'
		'"proxy_add_x_forwarded_for":"$proxy_add_x_forwarded_for",'
		'"server_protocol":"$server_protocol",'
		'"sent_http_content_type":"$sent_http_content_type",'
		'"sent_http_content_length":"$sent_http_content_length",'
		'"sent_http_cache_control":"$sent_http_cache_control",'
		'"sent_http_etag":"$sent_http_etag",'
		'"sent_http_last_modified":"$sent_http_last_modified",'
		'"sent_http_location":"$sent_http_location",'
		'"upstream_http_content_type":"$upstream_http_content_type",'
		'"upstream_http_content_length":"$upstream_http_content_length",'
		'"upstream_http_date":"$upstream_http_date",'
		'"upstream_http_server":"$upstream_http_server",'
		'"upstream_http_cache_control":"$upstream_http_cache_control",'
		'"upstream_http_etag":"$upstream_http_etag",'
		'"upstream_http_last_modified":"$upstream_http_last_modified",'
		'"upstream_http_location":"$upstream_http_location",'
		'"upstream_http_x_request_id":"$upstream_http_x_request_id",'
		'"upstream_http_x_runtime":"$upstream_http_x_runtime",'
		'"upstream_http_x_cache":"$upstream_http_x_cache",'
		'"upstream_http_vary":"$upstream_http_vary"'
	'}';

	access_log off;

	sendfile on;
	tcp_nopush on;
	tcp_nodelay on;
	keepalive_timeout 65;
	keepalive_requests 1000;

	client_max_body_size 100m;
	client_body_buffer_size 1m;

	proxy_http_version 1.1;
	proxy_buffering on;
	proxy_request_buffering on;
	proxy_read_timeout 300s;
	proxy_send_timeout 300s;
	proxy_connect_timeout 30s;

	upstream alpaca_mcp {
		server alpaca-mcp:8088;
		keepalive 64;
	}

	upstream alpaca_trading_api {
		server paper-api.alpaca.markets:443;
		keepalive 64;
	}

	upstream alpaca_data_api {
		server data.alpaca.markets:443;
		keepalive 64;
	}

	upstream alpaca_broker_api {
		server broker-api.alpaca.markets:443;
		keepalive 64;
	}

	server {
		listen 8000;
		server_name _;
		set $req_body "";
		set $req_body_truncated "0";
		set $resp_body "";
		set $resp_body_truncated "0";

		access_log /data/nginx-logs/llm_to_alpaca_access.log json_full;
		error_log /data/nginx-logs/llm_to_alpaca_error.log info;

		location / {
			access_by_lua_block {
				local cjson = require "cjson"
				local max_len = 1048576

				local function read_body()
					ngx.req.read_body()
					local body = ngx.req.get_body_data()
					if body then
						return body
					end

					local body_file = ngx.req.get_body_file()
					if not body_file then
						return nil
					end

					local fh, ferr = io.open(body_file, "rb")
					if not fh then
						ngx.log(ngx.ERR, "circuit-breaker unable to open body file: ", ferr or "unknown")
						return nil
					end

					local file_body = fh:read("*a")
					fh:close()
					return file_body
				end

				local function exceeds_risk_limit(value)
					local n = tonumber(value)
					return n ~= nil and n > 100
				end

				local function has_large_trade(obj)
					if type(obj) ~= "table" then
						return false
					end

					for k, v in pairs(obj) do
						if (k == "qty" or k == "quantity" or k == "notional") and exceeds_risk_limit(v) then
							return true
						end

						if type(v) == "table" and has_large_trade(v) then
							return true
						end
					end

					return false
				end

				local body = read_body()
				if not body or body == "" then
					return
				end

				if #body <= max_len then
					ngx.var.req_body = body
				else
					ngx.var.req_body = string.sub(body, 1, max_len)
					ngx.var.req_body_truncated = "1"
				end

				local ok, decoded = pcall(cjson.decode, body)
				if not ok then
					ngx.log(ngx.WARN, "circuit-breaker JSON decode failed")
					return
				end

				if has_large_trade(decoded) then
					ngx.status = ngx.HTTP_FORBIDDEN
					ngx.header["Content-Type"] = "application/json"
					ngx.say('{"error":"PROVOST_INTERVENTION: Risk Limit Exceeded. Attempted trade size too large. Blocked to protect capital."}')
					return ngx.exit(ngx.HTTP_FORBIDDEN)
				end
			}

			proxy_pass http://alpaca_mcp;

			body_filter_by_lua_block {
				local chunk = ngx.arg[1]
				local max_len = 1048576
				local existing = ngx.var.resp_body or ""

				if chunk and chunk ~= "" then
					if #existing < max_len then
						local remaining = max_len - #existing
						if #chunk <= remaining then
							ngx.var.resp_body = existing .. chunk
						else
							ngx.var.resp_body = existing .. string.sub(chunk, 1, remaining)
							ngx.var.resp_body_truncated = "1"
						end
					else
						ngx.var.resp_body_truncated = "1"
					end
				end
			}

			proxy_set_header Host localhost;
			proxy_set_header Connection "";
			proxy_set_header Accept-Encoding "";
			proxy_set_header X-Real-IP $remote_addr;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header X-Forwarded-Proto $scheme;
			proxy_set_header X-Forwarded-Host $host;
			proxy_set_header X-Forwarded-Port $server_port;
			proxy_set_header X-Request-Id $request_id;
		}
	}

	server {
		listen 8081;
		server_name _;
		set $req_body "";
		set $req_body_truncated "0";
		set $resp_body "";
		set $resp_body_truncated "0";

		access_log /data/nginx-logs/mcp_to_alpaca_access.log json_full;
		error_log /data/nginx-logs/mcp_to_alpaca_error.log info;

		location /trading/ {
			proxy_pass https://alpaca_trading_api/;

			body_filter_by_lua_block {
				local chunk = ngx.arg[1]
				local max_len = 1048576
				local existing = ngx.var.resp_body or ""

				if chunk and chunk ~= "" then
					if #existing < max_len then
						local remaining = max_len - #existing
						if #chunk <= remaining then
							ngx.var.resp_body = existing .. chunk
						else
							ngx.var.resp_body = existing .. string.sub(chunk, 1, remaining)
							ngx.var.resp_body_truncated = "1"
						end
					else
						ngx.var.resp_body_truncated = "1"
					end
				end
			}

			access_by_lua_block {
				local max_len = 1048576
				ngx.req.read_body()
				local body = ngx.req.get_body_data()
				if body and body ~= "" then
					if #body <= max_len then
						ngx.var.req_body = body
					else
						ngx.var.req_body = string.sub(body, 1, max_len)
						ngx.var.req_body_truncated = "1"
					end
				end
			}

			proxy_ssl_server_name on;
			proxy_ssl_name paper-api.alpaca.markets;

			proxy_set_header Host paper-api.alpaca.markets;
			proxy_set_header Connection "";
			proxy_set_header Accept-Encoding "";
			proxy_set_header X-Real-IP $remote_addr;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header X-Forwarded-Proto $scheme;
			proxy_set_header X-Forwarded-Host $host;
			proxy_set_header X-Forwarded-Port $server_port;
			proxy_set_header X-Request-Id $request_id;
		}

		location /data/ {
			proxy_pass https://alpaca_data_api/;

			body_filter_by_lua_block {
				local chunk = ngx.arg[1]
				local max_len = 1048576
				local existing = ngx.var.resp_body or ""

				if chunk and chunk ~= "" then
					if #existing < max_len then
						local remaining = max_len - #existing
						if #chunk <= remaining then
							ngx.var.resp_body = existing .. chunk
						else
							ngx.var.resp_body = existing .. string.sub(chunk, 1, remaining)
							ngx.var.resp_body_truncated = "1"
						end
					else
						ngx.var.resp_body_truncated = "1"
					end
				end
			}

			access_by_lua_block {
				local max_len = 1048576
				ngx.req.read_body()
				local body = ngx.req.get_body_data()
				if body and body ~= "" then
					if #body <= max_len then
						ngx.var.req_body = body
					else
						ngx.var.req_body = string.sub(body, 1, max_len)
						ngx.var.req_body_truncated = "1"
					end
				end
			}

			proxy_ssl_server_name on;
			proxy_ssl_name data.alpaca.markets;

			proxy_set_header Host data.alpaca.markets;
			proxy_set_header Connection "";
			proxy_set_header Accept-Encoding "";
			proxy_set_header X-Real-IP $remote_addr;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header X-Forwarded-Proto $scheme;
			proxy_set_header X-Forwarded-Host $host;
			proxy_set_header X-Forwarded-Port $server_port;
			proxy_set_header X-Request-Id $request_id;
		}

		location /broker/ {
			proxy_pass https://alpaca_broker_api/;

			body_filter_by_lua_block {
				local chunk = ngx.arg[1]
				local max_len = 1048576
				local existing = ngx.var.resp_body or ""

				if chunk and chunk ~= "" then
					if #existing < max_len then
						local remaining = max_len - #existing
						if #chunk <= remaining then
							ngx.var.resp_body = existing .. chunk
						else
							ngx.var.resp_body = existing .. string.sub(chunk, 1, remaining)
							ngx.var.resp_body_truncated = "1"
						end
					else
						ngx.var.resp_body_truncated = "1"
					end
				end
			}

			access_by_lua_block {
				local max_len = 1048576
				ngx.req.read_body()
				local body = ngx.req.get_body_data()
				if body and body ~= "" then
					if #body <= max_len then
						ngx.var.req_body = body
					else
						ngx.var.req_body = string.sub(body, 1, max_len)
						ngx.var.req_body_truncated = "1"
					end
				end
			}

			proxy_ssl_server_name on;
			proxy_ssl_name broker-api.alpaca.markets;

			proxy_set_header Host broker-api.alpaca.markets;
			proxy_set_header Connection "";
			proxy_set_header Accept-Encoding "";
			proxy_set_header X-Real-IP $remote_addr;
			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
			proxy_set_header X-Forwarded-Proto $scheme;
			proxy_set_header X-Forwarded-Host $host;
			proxy_set_header X-Forwarded-Port $server_port;
			proxy_set_header X-Request-Id $request_id;
		}

		location / {
			return 404 '{"error":"unknown proxy route","hint":"use /trading, /data, or /broker"}';
			default_type application/json;
		}
	}
}
